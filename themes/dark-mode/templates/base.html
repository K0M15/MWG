<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title or "Dark Mode" }}</title>
    <link rel="stylesheet" href="/static/{{ theme }}/style.css">
</head>
<body class="dark-theme">
    <header>
        <nav>
            <a href="/">Home</a>
            <a href="/about/">About</a>
            <a href="/blog/">Blog</a>
        </nav>
    </header>
    <main>
        {% if is_blog_post %}
        <article class="blog-post">
            <header>
                <h1>{{ title }}</h1>
                <p class="post-meta">Published on {{ meta.date.strftime('%Y-%m-%d') }} by {{ meta.author }}</p>
            </header>
            <div class="post-content">
                {{ content }}
            </div>
        </article>
        {% else %}
            {{ content }}
        {% endif %}
    </main>
    <footer>
        <p>&copy; 2024 Markdown Site (Dark Mode)</p>
    </footer>
</body>
</html>
